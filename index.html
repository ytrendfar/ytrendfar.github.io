<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Welcome</title>
        <style>
            *{
                padding: 0%;
                margin: 0%;
            }
            html,body{
                height: 170%;
            }
            #head{
                height: 22.5%;
                background: url(img/mt.jpg) no-repeat;
                background-size: auto;
                background-position: bottom center;
                background-color: aquamarine;
            }
            #head>a{
                font-size: 25px;
            }
            #header{
                float: right;
                font-size: 15px;
            }
            #head a:hover{
                color: rgb(197, 192, 187);
            }
            #head h1{
                text-align: center;
                font-size: 50px;
                font-weight: 200;
            }
            #head h2{
                font-size: 20px;
                font-weight: 200;
                text-align: center;
            }
            #body{
                height: 62.5%;
                background-color: rgb(24, 26, 27);
            }
            #body a:hover{
                color:rgb(91, 227, 255)
            }
            #foot{
                height: 15%;
                background-color: rgb(24, 26, 27);
                color: grey;
                text-align: center;
                line-height: 50px;
            }
            #foot a{
                text-decoration: underline;
                font-family:Arial, Helvetica, sans-serif;
                color: rgb(151, 151, 151);
                margin: 0px;
            }
            #foot a:hover{
                color: rgb(91, 227, 255);
            }
            #foot img{
                height: 50px;
            }
            #foot img:hover{
                content: url(img/hover.png);
            }
            a{
                text-decoration: none;
                color: rgb(232, 230, 227);
                font-family:'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
                margin: 20px;
                line-height: 50px;
            }
            hr{
                color: rgb(53, 57, 59);
                border: solid 1px;
            }
        </style>
    </head>
    <body>
        <div id="head">
            <a href="#">Configurable Title</a>
            <div id="header">
                <a href="#">HOME</a>
                <a href="#">ARCHIVES</a>
                <a href="#">TAGS</a>
                <a href="#">CATEGORIES</a>
            </div>
            <br><br><br>
            <h1>Clean Blog</h1>
            <h2>Full featured, responsive Hexo theme</h2>
        </div>
        <div id="body">
            <a href="#">Welcome to Clean Blog</a>
        </div>
        <hr>
        <div id="foot">
            <br>
            <a href="https://github.com/ytrendfar/ytrendfar.github.io" target="_blank"><img src="img/link.png"></a>
            <p>© 2022 YTrendFar</p>
            <p>The theme is modeled after <a href="https://www.codeblocq.com/assets/projects/hexo-theme-clean-blog/" target="_blank">Clean Blog</a></p>
            <p>Adapted by Young</p>
        </div>
    </body>
</html>
