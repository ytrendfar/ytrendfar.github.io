    <meta charset="UTF-8">
    <link rel="icon" type="image/x-icon" href="img/icon.ico">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Young</title>
    <style>
        html,
        body {
            height: 100%;
        }

        body {
            background-color: #333;
            transition: 0.5s;
            overflow-x: hidden;
        }

        * {
            padding: 0%;
            margin: 0%;
        }

        .icon {
            position: absolute;
        }

        #icon-1 {
            right: -100px;
            cursor: pointer;
            transition: 0.5s;
        }

        #icon-2 {
            right: 0px;
            cursor: pointer;
            transition: 0.5s;
        }

        #icon-3 {
            right: 75px;
            cursor: pointer;
            transition: 0.5s;
        }

        path {
            transition: 0.5s;
        }
    </style>
    <script>

        let isWhite = false

        window.onload = function () {

            //  实现夜间模式转换

        
            //获取按钮元素
            let icon1 = document.getElementById('icon-1')
            let icon2 = document.getElementById('icon-2')
            let icon3 = document.getElementById('icon-3')
            //绑定事件
            icon1.addEventListener('click', function () {
                document.body.style.backgroundColor = '#333'
                icon1.style.right = '-100px'
                icon2.style.right = '0px'
                icon3.children[0].setAttribute('fill', '#fff')
                isWhite = false
            })
            icon2.addEventListener('click', function () {
                document.body.style.backgroundColor = '#fff'
                icon1.style.right = '0px'
                icon2.style.right = '-100px'
                icon3.children[0].setAttribute('fill', '#333')
                isWhite = true
            })
            icon3.addEventListener('click',function(){
                window.open('https://github.com/ytrendfar/ytrendfar.github.io');
            })
            // 悬浮
            icon3.addEventListener('mouseover', function () {
                this.children[0].setAttribute('fill', 'rgb(91, 227, 255)')
            })
            icon3.addEventListener('mouseout', function () {
                if (isWhite) {
                    this.children[0].setAttribute('fill', '#333')
                }
                else {
                    this.children[0].setAttribute('fill', '#fff')
                }
            })
        }

    </script>
</head>
