<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/x-icon" href="img/icon.ico">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Young</title>
    <style>
        html,
        body {
            height: 100%;
        }

        body {
            background-color: #333;
            overflow-x: hidden;
            transition: 0.5s;
        }

        * {
            padding: 0%;
            margin: 0%;
        }

        .icon {
            position: absolute;
            cursor: pointer;
            transition: 0.5s;
        }

        path {
            transition: 0.5s;
        }

        #iconSun {
            right: -100px;
        }

        #iconMoon {
            right: 0px;
        }

        #iconGithub {
            right: 75px;
        }

        #navigation {
            left: 0;
            margin: 0 10px;
            width: 44px;
        }

        #x {
            left: -100px;
            z-index: 10;
        }

        .lefter{
            width: 100%;
            height: 100%;
            position: relative;
            left: -100%;
            transition: 1.2s;
            color: #fff;
            background-color: #333;
        }
    </style>
    <script>

        let isWhite = false

        // 我想写个函数用来绑定悬浮变色事件,当然只能是svg标签
        // 参数分别是要变色的svg标签和要变成的颜色（字符串）
        function colorTranslate(obj, color) {
            obj.addEventListener('mouseover', function () {
                this.children[0].setAttribute('fill', color)
            })
            obj.addEventListener('mouseout', function () {
                if (isWhite) {
                    this.children[0].setAttribute('fill', '#333')
                }
                else {
                    this.children[0].setAttribute('fill', '#fff')
                }
            })
            iconSun.addEventListener('click', function () {
                obj.children[0].setAttribute('fill', '#fff')
            })
            iconMoon.addEventListener('click', function () {
                obj.children[0].setAttribute('fill', '#333')
            })
        }




        window.onload = function () {

            //  实现夜间模式转换


            //获取按钮元素
            let iconSun = document.getElementById('iconSun')
            let iconMoon = document.getElementById('iconMoon')
            let iconGithub = document.getElementById('iconGithub')
            let navigation = document.getElementById('navigation')
            let x = document.getElementById('x')
            let lefter = document.getElementsByClassName('lefter')[0]

            //绑定事件

            //转换为夜间模式
            iconSun.addEventListener('click', function () {
                document.body.style.backgroundColor = '#333'
                iconSun.style.right = '-100px'
                iconMoon.style.right = '0px'
                // document.getRootNode.style.color = '#fff'
                isWhite = false

            })
            //转换为常规模式
            iconMoon.addEventListener('click', function () {
                document.body.style.backgroundColor = '#fff'
                iconSun.style.right = '0px'
                iconMoon.style.right = '-100px'
                // document.getRootNode.style.color = '#333'
                isWhite = true
            })
            //导航栏打开
            navigation.addEventListener('click', function () {
                x.style.left = '0px'
                navigation.style.left = '-100px'
                lefter.style.left = '0px'
            })
            //导航栏关闭
            x.addEventListener('click', function () {
                navigation.style.left = '0px'
                x.style.left = '-100px'
                lefter.style.left = '-100%'
            })
            //超链接
            iconGithub.addEventListener('click', function () {
                window.open('https://github.com/ytrendfar/ytrendfar.github.io');
            })
            // 悬浮
            colorTranslate(iconGithub, 'rgb(91, 227, 255)')
            colorTranslate(iconMoon, '#f4ea2a')
            colorTranslate(iconSun, '#FF9900')
            colorTranslate(navigation, 'rgb(91, 227, 255)')
            colorTranslate(x, 'rgb(91, 227, 255)')


        }

    </script>
</head>
